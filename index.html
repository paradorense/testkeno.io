<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greece Keno · AdmiralBET</title>
<style>
  :root {
    --blue-0: #0a1c3f; --blue-1: #12305f; --blue-2: #1a4178;
    --frame: #2b5894; --gold: #f4c020; --gold-hi: #fff19a; --gold-lo: #b8860b;
    --dim: #7b93bd; --txt: #cfe0ff; --hot: #ff7043; --cold: #4fc3f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(140% 120% at 50% 0%, var(--blue-2) 0%, var(--blue-0) 70%) fixed;
    color: #fff; font-family: "Segoe UI", system-ui, Arial, sans-serif; overflow: hidden;
  }
  #app { height: 100%; display: flex; flex-direction: column; padding: 2vh 2.2vw; }

  /* -------- Cabecera -------- */
  #top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1.4vw; }
  .rightcol { display: flex; flex-direction: column; align-items: center; gap: 1.7vh; justify-self: end; }
  #brandlogo { height: 2.6vw; width: auto; object-fit: contain; justify-self: end; }
  .hblock { display: flex; gap: 1.8vw; line-height: 1; align-items: center; }
  .hcell { display: flex; flex-direction: column; }
  .k { font-size: .95vw; letter-spacing: .12vw; color: var(--txt); opacity: .8; text-transform: uppercase; margin-bottom: .7vh; white-space: nowrap; }
  .v { font-size: 2.6vw; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; }
  .hblock.right { align-items: flex-end; text-align: right; }
  .hblock.center { align-items: center; text-align: center; }

  #logo { display: flex; align-items: center; gap: 1.4vw; font-weight: 800; line-height: 1; justify-self: center; }
  #logo .gr-ball { height: 5vw; width: auto; object-fit: contain; }

  .keno { display: flex; align-items: center; gap: .55vw; justify-content: center; }
  .keno .admiral { color:#fff; font-size:2.7vw; font-weight:900; letter-spacing:-.02vw; font-family:"Arial Narrow","Helvetica Neue",Arial,sans-serif; font-stretch:condensed; text-transform:uppercase; }
  .keno .bet { display:inline-flex; align-items:center; background:var(--gold); color:var(--blue-0); font-size:2.2vw; font-weight:900; letter-spacing:-.02vw; font-family:"Arial Narrow","Helvetica Neue",Arial,sans-serif; font-stretch:condensed; text-transform:uppercase; padding:.15vw .8vw .3vw; border-radius:.7vw; margin-left:.15vw; }

  .datebox { display: flex; align-items: center; gap: .8vw; }
  .cal { background: var(--gold); color: var(--blue-0); border-radius: .4vw; text-align: center; padding: .3vh .6vw; line-height: 1.05; }
  .cal .m { font-size: .85vw; font-weight: 700; text-transform: uppercase; }
  .cal .d { font-size: 1.5vw; font-weight: 800; }
  .clock { font-size: 2.5vw; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; }

  /* barra de progreso */
  #bar { height: 2.2vh; background: rgba(255,255,255,.1); border-radius: 1.3vh; margin: 1.2vh 0 1.4vh; margin-right: calc(22vw + 1.4vw); overflow: hidden; }
  #bar > i { display:block; height:100%; width:100%; background: linear-gradient(90deg, var(--gold-lo), var(--gold), var(--gold-hi)); border-radius:1vh; transition: width 1s linear; }

  /* -------- Rejilla -------- */
  #main { flex: 1; display: flex; gap: 1.4vw; min-height: 0; }
  #left { flex: 1; display: flex; flex-direction: column; gap: 1.2vh; min-height: 0; min-width: 0; }
  #board-wrap { flex: 1; position: relative; display: flex; min-height: 0; }
  #side { width: 22vw; flex-shrink: 0; display: flex; min-height: 0; }

  /* ---------- Bombo ---------- */
  #bombo {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5vh;
    padding: 1vh 0;
  }
  #bombo.hidden, #stats.hidden { display: none; }
  .drum {
    position: relative;
    height: min(18vw, 46%); width: auto; aspect-ratio: 1 / 1; flex: 0 0 auto;
    container-type: size;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 32%, rgba(255,255,255,.18), rgba(255,255,255,0) 45%),
      radial-gradient(circle at 50% 50%, #1a3a6e 0%, #0c1f43 70%);
    background-color: #112a55;
    box-shadow: inset 0 0 3vw rgba(0,0,0,.6), inset 0 0 0 .12vw rgba(143,167,209,.3), 0 0 0 .35vw #2b5894, 0 1vh 3vh rgba(0,0,0,.5);
  }
  /* guia circular sobre la que se apoyan las bolitas */
  .drum::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 82%; height: 82%; transform: translate(-50%,-50%);
    border-radius: 50%; border: .1vw solid rgba(143,167,209,.16); pointer-events: none;
  }
  .ring {
    position: absolute; inset: 0;
  }
  .ring .dot {
    position: absolute;
    width: 8.3cqw; height: 8.3cqw; border-radius: 50%;
    left: 50%; top: 50%;
    margin: -4.15cqw 0 0 -4.15cqw;
    display: flex; align-items: center; justify-content: center;
    font-size: 4.4cqw; font-weight: 700; color: #06203f;
    background: radial-gradient(circle at 38% 32%, rgba(150,174,214,.55), rgba(74,100,150,.28) 72%);
    box-shadow: inset 0 .08vh .12vh rgba(255,255,255,.25);
    transition: background .3s ease, box-shadow .3s ease, transform .3s ease;
  }
  .ring .dot.on {
    color: #3a2600; transform: scale(1.06);
    background: radial-gradient(circle at 38% 30%, var(--gold-hi), var(--gold) 60%, var(--gold-lo));
    box-shadow: inset 0 .1vh .15vh rgba(255,255,255,.8), 0 0 5.5cqw .8cqw rgba(244,192,32,.7);
  }
  .center-ball {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 50%; height: 50%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 25cqw; font-weight: 800; color: #3a2600;
    background:
      radial-gradient(circle at 36% 30%, #ffffff 0%, var(--gold-hi) 25%, var(--gold) 60%, var(--gold-lo) 100%);
    box-shadow: inset 0 .4vh .6vh rgba(255,255,255,.85), inset 0 -.5vh .8vh rgba(0,0,0,.35), 0 .5vh 1.5vh rgba(0,0,0,.5);
    font-variant-numeric: tabular-nums;
  }
  .center-ball.pop { animation: ballpop .5s cubic-bezier(.2,1.5,.4,1); }
  @keyframes ballpop { 0%{transform:translate(-50%,-50%) scale(.4);opacity:.3} 60%{transform:translate(-50%,-50%) scale(1.15)} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }

  .hopper {
    height: min(18vw, 46%); width: auto; aspect-ratio: 1 / 1; flex: 0 0 auto;
    border-radius: 50%; position: relative; overflow: hidden;
    background:
      radial-gradient(circle at 38% 32%, rgba(255,255,255,.18), rgba(255,255,255,0) 45%),
      radial-gradient(circle at 50% 50%, #1a3a6e 0%, #0c1f43 70%);
    background-color: #112a55;
    box-shadow: inset 0 0 3vw rgba(0,0,0,.6), inset 0 0 0 .12vw rgba(143,167,209,.3), 0 0 0 .35vw #2b5894, 0 1vh 3vh rgba(0,0,0,.5);
  }
  .hopper .mixer { position: absolute; inset: 5%; z-index: 2; }
  .hopper .glass {
    position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 4;
    background: radial-gradient(circle at 34% 20%, rgba(255,255,255,.14), rgba(255,255,255,0) 30%);
  }
  .mball {
    position: absolute; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums;
    box-shadow: inset 0 .14vh .2vh rgba(255,255,255,.8), inset 0 -.16vh .22vh rgba(0,0,0,.3), 0 .1vh .2vh rgba(0,0,0,.5);
  }
  #board {
    flex: 1; border: .25vw solid var(--frame); border-radius: 1.2vw;
    background: radial-gradient(130% 130% at 50% 0%, rgba(43,88,148,.45) 0%, rgba(10,28,63,.2) 60%), var(--blue-0);
    box-shadow: inset 0 0 4vw rgba(0,0,0,.5), 0 1vh 3vh rgba(0,0,0,.4);
    padding: 1.5vh 2.2vw;
    display: grid; grid-template-columns: repeat(10, 1fr); grid-auto-rows: 1fr; gap: .3vh .5vw; place-items: center; min-height: 0;
  }
  .cell {
    width: var(--cell-w, 6.2vw); aspect-ratio: 1.7 / 1;
    display: flex; align-items: center; justify-content: center;
    font-size: var(--cell-fs, 2.7vw); font-weight: 700; color: var(--dim); border-radius: 50%; transition: color .3s ease;
  }
  .cell.hit {
    color: #3a2600; border-radius: 50%/50%;
    background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 40%, var(--gold-lo) 100%);
    box-shadow: inset 0 .25vh .3vh rgba(255,255,255,.8), inset 0 -.3vh .4vh rgba(0,0,0,.35), 0 .3vh 1vh rgba(0,0,0,.45);
    text-shadow: 0 .05vw .05vw rgba(255,255,255,.4);
  }
  .cell.reveal { animation: pop .5s cubic-bezier(.2,1.5,.4,1); }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 55%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }
  .cell.latest { animation: ring 1.3s ease-in-out infinite; }
  @keyframes ring {
    0%,100% { box-shadow: inset 0 .25vh .3vh rgba(255,255,255,.8), inset 0 -.3vh .4vh rgba(0,0,0,.35), 0 0 0 .2vw rgba(255,255,255,.5), 0 .3vh 1vh rgba(0,0,0,.45); }
    50% { box-shadow: inset 0 .25vh .3vh rgba(255,255,255,.9), inset 0 -.3vh .4vh rgba(0,0,0,.35), 0 0 0 .35vw rgba(255,255,255,.85), 0 0 2vw .3vw rgba(244,192,32,.6); }
  }

  /* -------- Cuenta atras overlay -------- */
  #countdown {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(60% 60% at 50% 45%, rgba(10,28,63,.92), rgba(10,28,63,.97));
    border-radius: 1.2vw; backdrop-filter: blur(2px); z-index: 5;
  }
  #countdown.show { display: flex; }
  #countdown .lbl { font-size: 1.7vw; letter-spacing: .4vw; text-transform: uppercase; color: var(--txt); margin-bottom: 1.5vh; }
  #countdown .num { font-size: 17vw; font-weight: 800; line-height: 1; color: var(--gold); text-shadow: 0 0 4vw rgba(244,192,32,.5); font-variant-numeric: tabular-nums; }
  #countdown .num.beat { animation: beat .9s ease-out; }
  @keyframes beat { 0%{transform:scale(1.5);opacity:0} 35%{transform:scale(1);opacity:1} 100%{transform:scale(1);opacity:1} }

  /* -------- Franja inferior: historico + calientes/frios -------- */
  #strip {
    flex: 0 0 auto; height: 33vh; overflow: hidden; min-height: 0;
    transition: height .5s ease, opacity .4s ease;
  }
  #strip.hidden { height: 0; opacity: 0; }
  .panel {
    border: .12vw solid rgba(43,88,148,.6); border-radius: .8vw; background: rgba(10,28,63,.5);
    padding: .8vh 1.2vw; display: flex; flex-direction: column; overflow: hidden; height: 100%;
  }
  .panel .ptitle { font-size: .85vw; letter-spacing: .2vw; text-transform: uppercase; color: var(--dim); margin-bottom: .8vh; }
  /* historico */
  #history .rows { display: flex; flex-direction: column; gap: 1vh; overflow: hidden; flex: 1; justify-content: space-evenly; }
  .hrow { display: flex; align-items: center; gap: .8vw; padding: .5vh .8vw; border-radius: .6vw; }
  .hrow:nth-child(odd)  { background: rgba(43,88,148,.5); }
  .hrow:nth-child(even) { background: rgba(6,16,38,.55); }
  .hrow .hid { font-size: 1.4vw; color: var(--gold); min-width: 4.5vw; font-variant-numeric: tabular-nums; font-weight: 700; flex-shrink: 0; }
  .hrow .hnums { display: flex; gap: .35vw; flex: 1; min-width: 0; }
  .hrow .hn {
    flex: 1 1 0; max-width: 3.2vw; aspect-ratio: 1 / 1; min-width: 0;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1.3vw; font-weight: 700; color: #3a2600;
    background: linear-gradient(180deg, var(--gold-hi), var(--gold) 60%, var(--gold-lo));
    box-shadow: inset 0 .1vh .15vh rgba(255,255,255,.7), 0 .1vh .3vh rgba(0,0,0,.4);
  }
  /* calientes / frios verticales (columna derecha entre sorteos) */
  #stats { width: 100%; height: 100%; display: flex; gap: 1vw; padding: 1vh 0; }
  #stats .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1vh; min-height: 0; min-width: 0; }
  #stats .clabel { font-size: 1.2vw; font-weight: 800; letter-spacing: .15vw; text-transform: uppercase; flex-shrink: 0; }
  #stats .hot .clabel { color: var(--hot); }
  #stats .cold .clabel { color: var(--cold); }
  #stats .balls { flex: 1; display: flex; flex-direction: column; gap: .8vh; align-items: center; justify-content: space-evenly; min-height: 0; width: 100%; }
  #stats .sb {
    flex: 0 1 auto; height: min(9.5vw, 17%); aspect-ratio: 1 / 1; width: auto; max-width: 100%;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 2vw; font-weight: 800; color: #fff; position: relative;
    box-shadow: inset 0 -.7vh 1.1vh rgba(0,0,0,.45), inset 0 .45vh .8vh rgba(255,255,255,.3), inset 0 0 0 .12vh rgba(255,255,255,.15), 0 .5vh 1vh rgba(0,0,0,.5);
    text-shadow: 0 .12vh .25vh rgba(0,0,0,.4);
  }
  #stats .hot .sb {
    background:
      radial-gradient(circle at 30% 22%, rgba(255,255,255,.92) 0%, rgba(255,255,255,0) 20%),
      radial-gradient(circle at 38% 30%, #ffd0b3 0%, #ff9466 32%, var(--hot) 60%, #c33c12 100%);
  }
  #stats .cold .sb {
    color: #06314a; text-shadow: 0 .12vh .25vh rgba(255,255,255,.45);
    background:
      radial-gradient(circle at 30% 22%, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 20%),
      radial-gradient(circle at 38% 30%, #dcf3ff 0%, #82d3fb 32%, var(--cold) 60%, #137fb1 100%);
  }

  #status { text-align: center; font-size: .9vw; letter-spacing: .15vw; text-transform: uppercase; color: var(--dim); margin-top: .6vh; min-height: 1vw; }

  @media (max-width: 640px) {
    #top { grid-template-columns: 1fr 1fr; gap: 2vw 4vw; }
    #logo { grid-column: span 2; justify-content: center; gap: 2.5vw; }
    #logo .title { font-size: 6vw; } .gr-flag { --u: 7vw; }
    #brandlogo { grid-column: span 2; height: 9vw; justify-self: center; }
    .hblock .v, .clock { font-size: 6vw; }
    .cell { font-size: 4.4vw; max-width: none; }
    #strip { grid-template-columns: 1fr; height: auto; }
  }
  @media (prefers-reduced-motion: reduce) { .cell.reveal, .cell.latest { animation: none; } }
</style>
</head>

<script>
const GAME = 1100;
const HIST = 12;                                  // sorteos a pedir para historico y estadisticas
const API = `https://numericsapi.allwyn.gr/draws/v3.0/${GAME}/last/${HIST}`;
const POLL_MS = 5000;
const REVEAL_MS = 2500;
const COUNTDOWN_FROM = 10;
const HIST_ROWS = 4;                              // filas visibles en "ultimos sorteos"

const board = document.getElementById("board");
const cells = [];
let currentDrawId = null;
let revealTimer = null;
let nextDrawTime = null;
let prevDrawTime = null;
let waitingForDraw = false;
let pollTimer = null;

const MES = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

for (let n = 1; n <= 80; n++) {
  const c = document.createElement("div");
  c.className = "cell"; c.textContent = n;
  board.appendChild(c); cells[n] = c;
}

// --- Ajustar el tablero para que SIEMPRE quepa (evita solapes al mostrarse la franja) ---
const boardWrapEl = document.getElementById("board-wrap");
function fitBoard() {
  const cs = getComputedStyle(board);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const gaps = cs.gap.split(" ");
  const rGap = parseFloat(gaps[0]) || 0;
  const cGap = parseFloat(gaps[1] !== undefined ? gaps[1] : gaps[0]) || 0;
  const cols = 10, rows = 8;
  const availW = board.clientWidth - padX;
  const availH = board.clientHeight - padY;
  if (availW <= 0 || availH <= 0) return;
  const maxCellW = (availW - cGap * (cols - 1)) / cols;
  const maxCellH = (availH - rGap * (rows - 1)) / rows;
  const cellW = Math.max(0, Math.min(maxCellW, maxCellH * 1.7));
  const root = document.documentElement.style;
  root.setProperty("--cell-w", cellW + "px");
  root.setProperty("--cell-fs", (cellW * 0.44) + "px");
}
fitBoard();
if (window.ResizeObserver) new ResizeObserver(fitBoard).observe(boardWrapEl);
window.addEventListener("resize", fitBoard);

// --- Bombo: crear anillo de 20 bolitas en circulo ---
const ring = document.getElementById("ring");
const ringDots = [];
const RING_N = 20;
for (let k = 0; k < RING_N; k++) {
  const d = document.createElement("div");
  d.className = "dot";
  const ang = (k / RING_N) * 2 * Math.PI - Math.PI/2;
  const r = 41; // % del radio
  d.style.left = `calc(50% + ${Math.cos(ang)*r}%)`;
  d.style.top  = `calc(50% + ${Math.sin(ang)*r}%)`;
  ring.appendChild(d);
  ringDots.push(d);
}
const centerBall = document.getElementById("centerBall");

// --- Bombo inferior: bolas en movimiento continuo (mezclador) ---
const mixer = document.getElementById("mixer");
const MIX_N = 22;
const mballs = [];
const BALL_COLORS = [
  { hi: "#fff3a0", mid: "#f4c020", lo: "#b8860b", tx: "#3a2600" }, // oro
  { hi: "#ff9d9d", mid: "#e53935", lo: "#9c1515", tx: "#fff" },    // rojo
  { hi: "#9fd0ff", mid: "#1e88e5", lo: "#0d3f8a", tx: "#fff" },    // azul
  { hi: "#b6f0b6", mid: "#43a047", lo: "#1b5e20", tx: "#fff" },    // verde
  { hi: "#ffd49f", mid: "#fb8c00", lo: "#b85b00", tx: "#3a2600" }, // naranja
  { hi: "#e3b6ff", mid: "#8e24aa", lo: "#561180", tx: "#fff" },    // morado
  { hi: "#ffffff", mid: "#e7edf3", lo: "#aebccb", tx: "#1a2a45" }, // blanco
  { hi: "#9ff0e8", mid: "#00acc1", lo: "#006370", tx: "#fff" },    // turquesa
  { hi: "#ffc4e1", mid: "#ec407a", lo: "#a01050", tx: "#fff" }     // rosa
];
function initMixer() {
  mixer.innerHTML = "";
  mballs.length = 0;
  const cx = mixer.offsetWidth / 2, cy = mixer.offsetHeight / 2;
  const R = Math.min(cx, cy);
  const br = Math.max(8, R * 0.16);
  // numeros 1..80 barajados, sin repetir
  const nums = Array.from({ length: 80 }, (_, i) => i + 1);
  for (let i = nums.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nums[i], nums[j]] = [nums[j], nums[i]]; }
  const cOff = Math.floor(Math.random() * BALL_COLORS.length);
  for (let i = 0; i < MIX_N; i++) {
    const el = document.createElement("div"); el.className = "mball";
    el.style.width = el.style.height = (br * 2) + "px";
    el.style.fontSize = (br * 0.92) + "px";
    const c = BALL_COLORS[(i + cOff) % BALL_COLORS.length];
    el.style.background = `radial-gradient(circle at 35% 30%, ${c.hi}, ${c.mid} 58%, ${c.lo})`;
    el.style.color = c.tx;
    el.textContent = nums[i];
    mixer.appendChild(el);
    const a = Math.random() * Math.PI * 2, rad = Math.random() * (R - br);
    mballs.push({
      el, r: br,
      x: Math.cos(a) * rad, y: Math.sin(a) * rad,
      vx: (Math.random() - .5) * 1.5, vy: (Math.random() - .5) * 1.5
    });
  }
  for (const b of mballs) {
    b.el.style.left = (cx + b.x - b.r) + "px";
    b.el.style.top  = (cy + b.y - b.r) + "px";
  }
}
function mixStep() {
  const cx = mixer.offsetWidth / 2, cy = mixer.offsetHeight / 2;
  const R = Math.min(cx, cy);
  for (const b of mballs) {
    // turbulencia para que sigan agitandose, ligera gravedad y amortiguacion
    // giro suave en sentido horario + leve turbulencia
    const dist = Math.hypot(b.x, b.y) || 0.0001;
    b.vx += (-b.y / dist) * 0.13;   // tangente horaria
    b.vy += ( b.x / dist) * 0.13;
    b.vx += (Math.random() - .5) * 0.14;
    b.vy += (Math.random() - .5) * 0.14;
    b.vx *= 0.98; b.vy *= 0.98;
    const sp = Math.hypot(b.vx, b.vy), MAX = 1.8;
    if (sp > MAX) { b.vx *= MAX / sp; b.vy *= MAX / sp; }
    b.x += b.vx; b.y += b.vy;
    // rebote contra la pared circular
    const d = Math.hypot(b.x, b.y) || 0.0001, max = R - b.r;
    if (d > max) {
      const nx = b.x / d, ny = b.y / d;
      b.x = nx * max; b.y = ny * max;
      const dot = b.vx * nx + b.vy * ny;
      b.vx -= 2 * dot * nx * 0.78; b.vy -= 2 * dot * ny * 0.78;
    }
  }
  // separacion simple entre bolas para que no se solapen
  for (let i = 0; i < mballs.length; i++) {
    for (let j = i + 1; j < mballs.length; j++) {
      const a = mballs[i], c = mballs[j];
      let dx = c.x - a.x, dy = c.y - a.y;
      let dd = Math.hypot(dx, dy) || 0.0001;
      const min = a.r + c.r;
      if (dd < min) {
        const ov = (min - dd) / 2, nx = dx / dd, ny = dy / dd;
        a.x -= nx * ov; a.y -= ny * ov; c.x += nx * ov; c.y += ny * ov;
        const tx = a.vx; const ty = a.vy; a.vx = c.vx; a.vy = c.vy; c.vx = tx; c.vy = ty;
      }
    }
  }
  for (const b of mballs) {
    b.el.style.left = (cx + b.x - b.r) + "px";
    b.el.style.top  = (cy + b.y - b.r) + "px";
  }
  requestAnimationFrame(mixStep);
}
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
initMixer();
if (reduceMotion) {
  // sin animacion: asentar las bolas en el fondo con unos pasos de fisica
  for (let s = 0; s < 200; s++) {
    const cx = mixer.offsetWidth / 2, cy = mixer.offsetHeight / 2, R = Math.min(cx, cy);
    for (const b of mballs) {
      b.vy += 0.2; b.vx *= 0.9; b.vy *= 0.9; b.x += b.vx; b.y += b.vy;
      const d = Math.hypot(b.x, b.y) || 0.0001, max = R - b.r;
      if (d > max) { const nx = b.x/d, ny = b.y/d; b.x = nx*max; b.y = ny*max;
        const dot = b.vx*nx + b.vy*ny; b.vx -= 2*dot*nx*0.4; b.vy -= 2*dot*ny*0.4; }
    }
  }
  for (const b of mballs) { b.el.style.left = (mixer.offsetWidth/2 + b.x - b.r) + "px"; b.el.style.top = (mixer.offsetHeight/2 + b.y - b.r) + "px"; }
} else {
  requestAnimationFrame(mixStep);
}
window.addEventListener("resize", () => setTimeout(initMixer, 200));

function resetBombo() {
  ringDots.forEach(d => { d.classList.remove("on"); d.textContent = ""; });
  centerBall.textContent = "--";
}

// Alterna columna derecha: bombo (durante el sorteo / cuenta atras) vs calientes-frios (entre sorteos)
function setDrawingMode(drawing) {
  document.getElementById("strip").classList.toggle("hidden", drawing);
  document.getElementById("bombo").classList.toggle("hidden", !drawing);
  document.getElementById("stats").classList.toggle("hidden", drawing);
  if (drawing) setTimeout(initMixer, 60);   // recolocar bolas del bombo al reaparecer
}
function bomboShow(num, idx) {
  // bola central
  centerBall.textContent = num;
  centerBall.classList.remove("pop"); void centerBall.offsetWidth; centerBall.classList.add("pop");
  // encender dot del anillo
  if (ringDots[idx]) { ringDots[idx].textContent = num; ringDots[idx].classList.add("on"); }
  // agitar suavemente el mezclador al salir cada bola
  for (const b of mballs) { b.vx += (Math.random() - .5) * 2.4; b.vy -= Math.random() * 2; }
}

function clearGrid() {
  if (revealTimer) { clearInterval(revealTimer); revealTimer = null; }
  for (let n = 1; n <= 80; n++) cells[n].className = "cell";
}
function fmtHM(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

function revealDraw(draw) {
  clearGrid();
  resetBombo();
  waitingForDraw = false;
  document.getElementById("countdown").classList.remove("show");
  setDrawingMode(true);   // ocultar calientes y mostrar bombo mientras salen las bolas
  const list = (draw.winningNumbers && draw.winningNumbers.list) ? draw.winningNumbers.list.slice() : [];
  document.getElementById("drawTime").textContent = fmtHM(draw.drawTime);

  let i = 0, prev = null;
  revealTimer = setInterval(() => {
    if (i >= list.length) {
      clearInterval(revealTimer); revealTimer = null;
      if (prev && cells[prev]) cells[prev].classList.remove("latest");
      setDrawingMode(false);  // mostrar ultimos sorteos + calientes/frios al terminar el sorteo
      return;
    }
    if (prev && cells[prev]) cells[prev].classList.remove("latest");
    const n = list[i];
    if (cells[n]) cells[n].classList.add("hit", "reveal", "latest");
    bomboShow(n, i);     // mostrar en el bombo
    prev = n; i++;
  }, REVEAL_MS);
}

// pinta historico (ultimos sorteos con resultados)
function renderHistory(results) {
  const rows = document.getElementById("histRows");
  rows.innerHTML = "";
  results.slice(0, HIST_ROWS).forEach(d => {
    const list = d.winningNumbers.list.slice().sort((a,b)=>a-b);
    const row = document.createElement("div"); row.className = "hrow";
    const id = document.createElement("div"); id.className = "hid"; id.textContent = fmtHM(d.drawTime);
    const nums = document.createElement("div"); nums.className = "hnums";
    list.forEach(n => { const b = document.createElement("div"); b.className = "hn"; b.textContent = n; nums.appendChild(b); });
    row.appendChild(id); row.appendChild(nums); rows.appendChild(row);
  });
}

// calientes / frios sobre los resultados disponibles
function renderStats(results) {
  const freq = new Array(81).fill(0);
  results.forEach(d => d.winningNumbers.list.forEach(n => { if (n>=1 && n<=80) freq[n]++; }));
  const arr = [];
  for (let n = 1; n <= 80; n++) arr.push({ n, c: freq[n] });
  const hot = arr.slice().sort((a,b)=> b.c - a.c || a.n - b.n).slice(0, 5);
  const cold = arr.slice().sort((a,b)=> a.c - b.c || a.n - b.n).slice(0, 5);

  const fill = (id, items) => {
    const box = document.getElementById(id); box.innerHTML = "";
    items.forEach(it => { const b = document.createElement("div"); b.className = "sb"; b.textContent = it.n; box.appendChild(b); });
  };
  fill("hotBalls", hot);
  fill("coldBalls", cold);
}

async function poll() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();
    const active = data.find(d => d.status === "active");
    const results = data.filter(d => d.winningNumbers && d.winningNumbers.list && d.winningNumbers.list.length);
    const result = results[0] || data[data.length - 1];

    if (active) nextDrawTime = active.drawTime;
    if (result) prevDrawTime = result.drawTime;
    const nt = document.getElementById("nextTime");
    if (nt) nt.textContent = nextDrawTime ? fmtHM(nextDrawTime) : "--:--";

    document.getElementById("status").textContent = "";

    if (results.length) { renderHistory(results); renderStats(results); }

    if (result && result.drawId !== currentDrawId) {
      currentDrawId = result.drawId;
      revealDraw(result);
    }
  } catch (e) {
    document.getElementById("status").textContent = "Sin conexion \u00b7 reintentando";
    console.error(e);
  } finally {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(poll, waitingForDraw ? 800 : POLL_MS);
  }
}

function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0");
  document.getElementById("calM").textContent = MES[now.getMonth()];
  document.getElementById("calD").textContent = String(now.getDate()).padStart(2,"0");

  // barra + contador MM:SS
  if (nextDrawTime) {
    const leftMs = nextDrawTime - now.getTime();
    if (nextDrawTime && prevDrawTime && nextDrawTime > prevDrawTime) {
      const total = nextDrawTime - prevDrawTime;
      const elapsed = now.getTime() - prevDrawTime;
      document.querySelector("#bar > i").style.width = Math.max(0, Math.min(100, (elapsed/total)*100)) + "%";
    }
    const ls = Math.max(0, Math.ceil(leftMs/1000));
    const mm = String(Math.floor(ls/60)).padStart(2,"0");
    const ss = String(ls%60).padStart(2,"0");
    const nextEl = document.getElementById("nextIn");
    if (nextEl) nextEl.textContent = mm + ":" + ss;
  }

  // cuenta atras 10 -> 0, mantenida hasta que entren bolas nuevas
  const cd = document.getElementById("countdown");
  const cdNum = document.getElementById("cdNum");
  const strip = document.getElementById("strip");
  if (nextDrawTime) {
    const secsLeft = Math.ceil((nextDrawTime - now.getTime()) / 1000);
    if (secsLeft <= 0) waitingForDraw = true;
    if (waitingForDraw) {
      if (cdNum.textContent !== "0") { cdNum.textContent = "0"; cdNum.classList.remove("beat"); void cdNum.offsetWidth; cdNum.classList.add("beat"); }
      cd.classList.add("show"); setDrawingMode(true);
    } else if (secsLeft <= COUNTDOWN_FROM) {
      if (cdNum.textContent !== String(secsLeft)) { cdNum.textContent = secsLeft; cdNum.classList.remove("beat"); void cdNum.offsetWidth; cdNum.classList.add("beat"); }
      cd.classList.add("show"); setDrawingMode(true);
    } else {
      cd.classList.remove("show");
    }
  } else {
    cd.classList.remove("show");
  }
}

poll();
tick();
setInterval(tick, 1000);
</script>
